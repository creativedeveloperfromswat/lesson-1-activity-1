<!DOCTYPE html>
<html>

<head>

    <title>Carousel Example</title>

    <meta charset="utf-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

</head>

<body>
    <div class="container">
        <h2>Carousel Example</h2>
        <div id="mycarousel" class="carousel slide" data-ride="carousel">

        <!---Indicators-->
       <ol class="carousel-indicators">
        <li data-target="#mycarousel" data-slide-to="0" class="active"></li>
        <li data-target="#mycarousel" data-slide-to="1"></li>
        <li data-target="#mycarousel" data-slide-to="2"></li>
       </ol>

       <!---Wrapper for slides-->
       <div class="carousel-inner">
        <div class="item active">
            <img src="https://plus.unsplash.com/premium_photo-1674837818096-21453c490ddb?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8ZXF1YWwlMjB3aWR0aCUyMGltYWdlcyUyMG9mJTIwZ2lybHN8ZW58MHx8MHx8fDA%3D">
        </div>
         
        <div class="item">
            <img src="https://images.unsplash.com/photo-1673972615802-6a94136b9896?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8ZXF1YWwlMjB3aWR0aCUyMGltYWdlcyUyMG9mJTIwZ2lybHN8ZW58MHx8MHx8fDA%3D">
        </div>

        <div class="item">
            <img src="https://images.unsplash.com/photo-1770347271178-97a4f8ffb183?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHw3fHx8ZW58MHx8fHx8">
        </div>
       </div>

       <!--Left and Right controls-->
       <a class="left carousel-control" href="#mycaousel" data-slide="prev">
        <span class="glyphicon glyphicon-chevron-left"></span>
       </a>

    <a class="right carousel-control" href="#mycarousel" data-slide="next">
        <span class="glyphicon glyphicon-chevron-right"></span>
    </a>
        </div>
    </div>
</body>
</html>
