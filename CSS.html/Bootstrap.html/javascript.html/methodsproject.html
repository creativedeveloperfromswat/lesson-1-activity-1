<<!DOCTYPE html>
<html>

<head>
    <title>Methods,Loops and Switches in JS Project</title>
</head>

<body>
    <h2>Javascript String Method</h2>
    <p>Basic Methods</p>
    <p id="demo"></p>

    <script>
        var str = "AmAZiNg";
        document.write(str.toUpperCase());
        document.write("<br>");

        document.write(str.toLowerCase());
        document.write("<br>");

        document.write(str.startsWith("i"));
        document.write("<br>");

        //Test method -> True or False
        var str1 = "I learn about methods";
        var patt = new RegExp("about");
        var res = patt.test(str1);
        document.write(res);
        document.write("<br><br>");

        //Random numbers instead of 1-100
        for (var i = 1; i <= 100; i++) {
            var randomNum = Math.floor(Math.random() * 100) + 1;
            document.write(randomNum + "<br>");
        }

        var day;
        switch (new Date().getDay()) {
            case 0:
                day = "Sunday";
                break;

            case 1:
                day = "Monday";
                break;

            case 2:
                day = "Tuesday";
                break;

            case 3:
                day = "Wednesday";
                break;

            case 4:
                day = "Thursday";
                break;

            case 5:
                day = "Friday";
                break;

            case 6:
                day = "Saturday";
                break;
        }

        document.getElementById("demo").innerHTML = "3/10/2026 " + day;

    </script>
</body>

</html>
