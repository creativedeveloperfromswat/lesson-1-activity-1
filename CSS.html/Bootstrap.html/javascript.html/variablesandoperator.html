<!DOCTYPE html>
<html>
    <head>
        <title>Variables and Operator Project</title>

        <style>
            body{
                background-color: antiquewhite;
            }
        </style>
    </head>

    <body>
        <h1>Javascript Variables</h1>
        <p>Sum of two numbers</p>
        <p id="result"></p>

        <h2> Javascript Operators</h2>
        <p id="demo"></p>

        <script>

            var x=5;
            var y=6;
            var z=x + y;

             document.getElementById("result").innerHTML = z;

              a = 23;
                b = 12;

                document.write("The value of a + b is", a + b, "<br>")
                document.write("The value of a - b is", a - b, "<br>")
                document.write("The value of a / b is", a / b, "<br>")
                document.write("The value of a * b is", a * b, "<br>")


        </script>
    </body>
</html>
