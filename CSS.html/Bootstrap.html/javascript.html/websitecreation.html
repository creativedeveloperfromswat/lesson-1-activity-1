<!DOCTYPE html>
<html>

<head>
    <title>My Simple Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Navbar */
        .navbar {
            background-color: black;
            padding: 10px;
        }

        .navbar a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        /* Banner */
        .banner {
            width: 100%;
            height: 200px;
        }

        /* Layout */
        .container {
            display: flex;
            padding: 10px;
        }

        .box {
            border: 1px solid gray;
            margin: 10px;
             padding: 10px;
            width: 30%;
            text-align: center;
        }
    </style>
    </head>
    
    <body>
    
        <!-- Navigation Bar -->
        <div class="navbar">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>

        <!-- Banner Image -->
        <img src="https://picsum.photos/id/1015/1200/200" class="banner">
        
        <!-- Layout -->
        <div class="container">
            <div class="box">
                <h3>Section 1</h3>
                <p>This is first section</p>
            </div>
        
            <div class="box">
                <h3>Section 2</h3>
                <p>This is second section</p>
            </div>
        
            <div class="box">
                <h3>Section 3</h3>
                <p>This is third section</p>
            </div>
        </div>

        </body>
        
        </html>
