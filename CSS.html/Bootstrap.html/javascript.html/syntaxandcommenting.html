<!DOCTYPE html>
<html>
    <head>
        <title> Javascript Syntax and Commenting Guide</title>
    </head>

    <body>
        <h1 id="a"></h1>
        <p id="demo"></p>
        <script>
            document.getElementById("a").innerHTML="Hello";
            //Document.write=("Welcome to Javascript");

            a=23;
            b=12;

            document.write("The value of a + b is", a + b, "<br>")
            document.write("The value of a - b is", a - b, "<br>")
            document.write("The value of a / b is", a / b, "<br>")
            document.write("The value of a * b is", a *  b, "<br>")

            var x=5;
            var y=2;
            var z= x+y;

          document.getElementById("demo").innerHTML = z;

        </script>
    </body>
</html>
