<!DOCTYPE html>
<html>

<head>
    <title>Arrays Project</title>
</head>
<script src="main.JS"></script>

<body>
    <p id="demo"></p>
    <script>
        var student = {
            RollNo: 12,
            name: "WajeehaNisar",
            age: 19,
            marks: 90
        };

        document.getElementById("demo").innerHTML = "my name is" + student.name + "<br>" + "my age is" + student.age;


         var colors = ["black", "orange", "yellow", "purple"];
            document.write(colors[3], "<br>");
            document.write(colors, "<br>");
            document.write(colors.join(" * "), "<br>");
            colors.pop()
            document.write(colors, "<br>");
            colors.unshift("pink")
            document.write(colors, "<br>");
            colors.shift()
            document.write(colors, "<br>");
    </script>
</body>

</html>
