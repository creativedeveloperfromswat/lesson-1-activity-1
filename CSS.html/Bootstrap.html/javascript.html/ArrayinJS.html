<!DOCTYPE html>
<html>
    <head>
        <title>Array In JS</title>
    </head>
    <body>

        <script>
            var colors= ["black", "orange", "golden", "green"];
            document.write(colors[3],"<br>");
             document.write(colors, "<br>");
             document.write(colors.join(" * ") ,"<br>");
             colors.pop()
             document.write(colors,"<br>");
             colors.unshift("pink")
             document.write(colors, "<br>");
             colors.shift()
                document.write(colors, "<br>");
        </script>
    </body>
</html>
