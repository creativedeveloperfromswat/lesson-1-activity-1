<!DOCTYPE html>
<html>

<head>
    <title>Functions Project</title>
</head>

<body>
    <button onclick="greet()">click me</button>
    <button onclick="add(5,2)">click me</button>
    <button onclick="sub(5,2)">click me</button>
    <button onclick="mul(5,2)">click me</button>
    <button onclick="div(5,2)">click me</button>

    <script>
        function greet() {
            alert("Welcome to my page!");
        }


        function add(a, b) {
            document.write("a+b is", (a + b), "<br>");
        }

        function sub(a, b) {
            document.write("a-b is", (a - b), "<br>");
        }

        function mul(a, b) {
            document.write("a * b is", (a * b), "<br>");
        }

        function div(a, b) {
            document.write("a / b is", (a / b), "<br>");
        }

        function add(a, b) {
            return a + b;
        }
        document.write(add(5, 2));

    </script>
</body>

</html>
