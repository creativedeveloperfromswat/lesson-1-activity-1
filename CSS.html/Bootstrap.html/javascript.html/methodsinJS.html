<!DOCTYPE html>
<html>
    <head>
        <title>Methods,Loops and Switches in JS</title>
    </head>

    <body>
        <h2>Javascript String Method</h2>
        <p>Basic Methods</p>
        <p id="demo"></p>

        <script>
            var str="AmAZiNg";
           document.write(str.toUpperCase());
            document.write("<br>");
            
            document.write(str.toLowerCase());
             document.write("<br>");

              document.write(str.startsWith("i"));
                document.write("<br>");

                //Test method-> True or False
                var str1= "I learn about methods";
                var patt= new RegExp("about");
                var res=patt.test(str1);
                 document.write(res );

                 for(var i=1 ;  i<101 ; i++){
                  document.write (i, "<br>" ) 
                 }

                 var day;
                 switch (new Date().getDay()){
                    case 0:
                    day = "Sunday";
                    break;

                      case 1:
                         day =" Monday";
                         break;

                          case 2:
                         day = "Tuesday";
                         break;

                          case 3:
                         day = "Wednesday";
                         break;


                         case 4:
                         day = "Thursday";
                         break;

                         case 5:
                         day = "Friday";
                         break;

                         case 6:
                         day = "Saturday";
                         break;
                         }
                         document.getElementById("demo").innerHTML="3/8/2026" +day;
                 
        </script>
    </body>
</html>
