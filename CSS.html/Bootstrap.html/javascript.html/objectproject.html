<!DOCTYPE html>
<html>

<head>
    <title>Sum of Arguments & Trigonometric Values</title>
</head>

<body>
<p>Finding the largest number with the help of argument object</p>
<p id="result"></p>

<script>
    function findMax() {
        var i;
        var max = 0;
        for (i = 0; i < arguments.length; i++) {
            if (arguments[i] > max) {
                max = arguments[i];
            }
        }

        return max;
    }

    document.getElementById("result").innerHTML = findMax(4, 5, 6);
    var value = Math.asin(1);
        document.write(value, "<br>")
        var value = Math.acos(- 1);
        document.write(value, "<br>")
        var value = Math.atan(2);
        document.write(value, "<br>")
        </script>
</body>
</html>
